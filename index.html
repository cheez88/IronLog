<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>IronLog — Workout Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #14161A; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    input, textarea, button { -webkit-tap-highlight-color: transparent; }
    input:focus, textarea:focus { border-color: #E8472B !important; outline: none; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- React -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Recharts (needs PropTypes) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <!-- Babel standalone for JSX transform -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

<script type="text/babel" data-presets="react">
// ─── Inline SVG icons (no external dependency) ───────────────────────────────
function Icon({ size=24, color='currentColor', strokeWidth=2, style, children, ...rest }) {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
      fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round"
      strokeLinejoin="round" style={style} {...rest}>
      {children}
    </svg>
  );
}
const Plus         = p => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
const Dumbbell     = p => <Icon {...p}><path d="M14.4 14.4 9.6 9.6"/><path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/><path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/><path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829 2 2 0 1 1 2.828 2.829l1.767-1.768a2 2 0 1 1 2.829 2.829z"/></Icon>;
const Footprints   = p => <Icon {...p}><path d="M4 16v-2.5C4 10 6 8 9.5 8"/><path d="M12.5 8C16 8 18 10 18 13.5v.5"/><path d="M4.5 20.5c.5.5 1 .5 1.5 0l1-1c.5-.5.5-1 0-1.5l-2-2c-.5-.5-1-.5-1.5 0l-1 1c-.5.5-.5 1 0 1.5z"/><path d="M18.5 20.5c.5.5 1 .5 1.5 0l1-1c.5-.5.5-1 0-1.5l-2-2c-.5-.5-1-.5-1.5 0l-1 1c-.5.5-.5 1 0 1.5z"/></Icon>;
const TrendingUp   = p => <Icon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Icon>;
const TrendingDown = p => <Icon {...p}><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></Icon>;
const Minus        = p => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
const Flame        = p => <Icon {...p}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></Icon>;
const Trash2       = p => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
const ChevronRight = p => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>;
const ChevronLeft  = p => <Icon {...p}><polyline points="15 18 9 12 15 6"/></Icon>;
const X            = p => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
const Calendar     = p => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Icon>;
const CalendarDays = p => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/></Icon>;
const Award        = p => <Icon {...p}><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></Icon>;
const ListChecks   = p => <Icon {...p}><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><line x1="11" y1="8" x2="21" y2="8"/><line x1="11" y1="18" x2="21" y2="18"/></Icon>;

// ─── Recharts components ──────────────────────────────────────────────────────
const {
  LineChart, Line, BarChart, Bar,
  XAxis, YAxis, CartesianGrid, Tooltip,
  ResponsiveContainer, Dot, Cell,
} = Recharts;

// ─── React hooks ─────────────────────────────────────────────────────────────
const { useState, useEffect, useMemo, useCallback } = React;

// ─── Storage (localStorage) ───────────────────────────────────────────────────
const STORAGE_KEY  = 'ironlog-workouts';
const SETTINGS_KEY = 'ironlog-settings';

// ─── Utility helpers ──────────────────────────────────────────────────────────
const uid      = () => `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
const todayISO = () => new Date().toISOString().slice(0, 10);

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}
function formatDateShort(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
}
function parseISO(iso) { return new Date(iso + 'T00:00:00'); }
function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function startOfWeek(d) {
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const res = new Date(d);
  res.setDate(d.getDate() + diff);
  res.setHours(0,0,0,0);
  return res;
}
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function addMonths(d, n) { return new Date(d.getFullYear(), d.getMonth()+n, 1); }

function buildVisitBuckets(uniqueDates, granularity) {
  if (uniqueDates.length === 0) return [];
  const sorted = [...uniqueDates].sort();
  const first = parseISO(sorted[0]);
  const last  = parseISO(sorted[sorted.length-1]);
  const counts = new Map();
  sorted.forEach(iso => {
    const d = parseISO(iso);
    let key;
    if (granularity === 'week')       key = toISO(startOfWeek(d));
    else if (granularity === 'month') key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    else                              key = `${d.getFullYear()}`;
    counts.set(key, (counts.get(key)||0) + 1);
  });
  const buckets = [];
  if (granularity === 'week') {
    let cur = startOfWeek(first), end = startOfWeek(last);
    while (cur <= end) {
      const key = toISO(cur);
      buckets.push({ key, label: formatDateShort(key), count: counts.get(key)||0 });
      cur = addDays(cur, 7);
    }
  } else if (granularity === 'month') {
    let cur = startOfMonth(first), end = startOfMonth(last);
    while (cur <= end) {
      const key = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`;
      const label = cur.toLocaleDateString('en-AU', { month:'short', year:'2-digit' });
      buckets.push({ key, label, count: counts.get(key)||0 });
      cur = addMonths(cur, 1);
    }
  } else {
    let y = first.getFullYear(), endY = last.getFullYear();
    while (y <= endY) {
      buckets.push({ key:`${y}`, label:`${y}`, count: counts.get(`${y}`)||0 });
      y++;
    }
  }
  return buckets;
}

function trendSlope(buckets) {
  const n = buckets.length;
  if (n < 2) return 0;
  const xs = buckets.map((_,i) => i);
  const ys = buckets.map(b => b.count);
  const xM = xs.reduce((a,b)=>a+b,0)/n;
  const yM = ys.reduce((a,b)=>a+b,0)/n;
  let num=0, den=0;
  for (let i=0;i<n;i++) { num+=(xs[i]-xM)*(ys[i]-yM); den+=(xs[i]-xM)**2; }
  return den===0 ? 0 : num/den;
}

function formatDuration(totalSeconds) {
  if (totalSeconds == null || isNaN(totalSeconds)) return '—';
  const s = Math.round(totalSeconds);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function paceSecondsPerUnit(distance, durationSeconds) {
  if (!distance || distance <= 0) return null;
  return durationSeconds / distance;
}
function formatPace(secPerUnit, distanceUnit) {
  if (secPerUnit == null || isNaN(secPerUnit) || !isFinite(secPerUnit)) return '—';
  return `${formatDuration(secPerUnit)}/${distanceUnit}`;
}
function activityKey(type, name) { return `${type}::${name}`; }

// ─── Main App ─────────────────────────────────────────────────────────────────
function IronLog() {
  const [workouts, setWorkouts]           = useState([]);
  const [unit, setUnit]                   = useState('kg');
  const [distanceUnit, setDistanceUnit]   = useState('km');
  const [loaded, setLoaded]               = useState(false);
  const [view, setView]                   = useState('log');
  const [selectedActivity, setSelectedActivity] = useState(null);
  const [showForm, setShowForm]           = useState(false);
  const [toast, setToast]                 = useState(null);
  const [calendarMonth, setCalendarMonth] = useState(startOfMonth(new Date()));
  const [granularity, setGranularity]     = useState('week');
  const [selectedDay, setSelectedDay]     = useState(null);

  const emptyForm = {
    type: 'strength', exercise: '', weight: '', reps: '', sets: '',
    distance: '', durationMin: '', durationSec: '', route: '',
    date: todayISO(), notes: '',
  };
  const [form, setForm] = useState(emptyForm);

  // Load from localStorage
  useEffect(() => {
    try {
      const w = localStorage.getItem(STORAGE_KEY);
      if (w) setWorkouts(JSON.parse(w));
    } catch(e) {}
    try {
      const s = localStorage.getItem(SETTINGS_KEY);
      if (s) {
        const p = JSON.parse(s);
        if (p.unit) setUnit(p.unit);
        if (p.distanceUnit) setDistanceUnit(p.distanceUnit);
      }
    } catch(e) {}
    setLoaded(true);
  }, []);

  const persistWorkouts = useCallback((next) => {
    setWorkouts(next);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch(e) {}
  }, []);

  const persistSettings = useCallback((nextUnit, nextDistUnit) => {
    setUnit(nextUnit);
    setDistanceUnit(nextDistUnit);
    try { localStorage.setItem(SETTINGS_KEY, JSON.stringify({ unit: nextUnit, distanceUnit: nextDistUnit })); } catch(e) {}
  }, []);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const strengthNames = useMemo(() => {
    const set = new Set(workouts.filter(w => w.type !== 'run').map(w => w.exercise));
    return Array.from(set).sort((a,b) => a.localeCompare(b));
  }, [workouts]);

  const activities = useMemo(() => {
    const map = new Map();
    workouts.forEach(w => {
      const type = w.type || 'strength';
      const key = activityKey(type, w.exercise);
      if (!map.has(key)) map.set(key, { type, name: w.exercise });
    });
    return Array.from(map.values()).sort((a,b) => a.name.localeCompare(b.name));
  }, [workouts]);

  const sortedWorkouts = useMemo(
    () => [...workouts].sort((a,b) => a.date < b.date ? 1 : a.date > b.date ? -1 : b.createdAt - a.createdAt),
    [workouts]
  );

  const isPR = useCallback((entry) => {
    const type = entry.type || 'strength';
    const prior = workouts.filter(w =>
      (w.type||'strength') === type && w.exercise === entry.exercise &&
      w.date <= entry.date && w.id !== entry.id
    );
    if (type === 'run') {
      const ep = paceSecondsPerUnit(entry.distance, entry.durationSeconds);
      if (ep == null) return false;
      const best = Math.min(...prior.map(w => paceSecondsPerUnit(w.distance, w.durationSeconds)).filter(p => p != null), Infinity);
      return ep < best;
    }
    const priorMax = prior.reduce((m,w) => Math.max(m,w.weight), 0);
    return entry.weight > priorMax;
  }, [workouts]);

  function resetForm() { setForm(f => ({ ...emptyForm, type: f.type })); }

  function handleSubmit(e) {
    e.preventDefault();
    if (form.type === 'run') {
      if (!form.distance || (!form.durationMin && !form.durationSec)) return;
    } else {
      if (!form.exercise.trim() || !form.weight) return;
    }
    const durationSeconds = form.type === 'run'
      ? parseInt(form.durationMin||'0',10)*60 + parseInt(form.durationSec||'0',10)
      : null;
    const route = form.route.trim();
    const combinedNotes = form.type === 'run'
      ? [route ? `Route: ${route}` : null, form.notes.trim()||null].filter(Boolean).join(' — ')
      : form.notes.trim();
    const entry = {
      id: uid(), type: form.type,
      exercise: form.type === 'run' ? 'Run' : form.exercise.trim(),
      date: form.date, notes: combinedNotes, createdAt: Date.now(),
      weight: form.type === 'strength' ? parseFloat(form.weight) : null,
      reps: form.type === 'strength' && form.reps ? parseInt(form.reps,10) : null,
      sets: form.type === 'strength' && form.sets ? parseInt(form.sets,10) : null,
      distance: form.type === 'run' ? parseFloat(form.distance) : null,
      durationSeconds,
    };
    const next = [...workouts, entry];
    persistWorkouts(next);
    const priorSame = workouts.filter(w => (w.type||'strength') === entry.type && w.exercise === entry.exercise);
    if (entry.type === 'run') {
      const ep = paceSecondsPerUnit(entry.distance, entry.durationSeconds);
      const best = Math.min(...priorSame.map(w => paceSecondsPerUnit(w.distance,w.durationSeconds)).filter(p=>p!=null), Infinity);
      if (ep != null && isFinite(best) && ep < best) {
        showToast(`New best pace — ${route||'Run'} at ${formatPace(ep, distanceUnit)}`);
      } else { showToast('Run logged'); }
    } else {
      const priorMax = priorSame.reduce((m,w) => Math.max(m,w.weight), 0);
      if (entry.weight > priorMax && priorMax > 0) {
        showToast(`New PR — ${entry.exercise} at ${entry.weight}${unit}`);
      } else { showToast('Workout logged'); }
    }
    resetForm();
    setShowForm(false);
  }

  function handleDelete(id) { persistWorkouts(workouts.filter(w => w.id !== id)); }

  function openProgress(type, name) {
    setSelectedActivity({ type: type||'strength', name });
    setView('progress');
  }

  const activityStats = useMemo(() => {
    if (!selectedActivity) return null;
    const { type, name } = selectedActivity;
    const entries = workouts
      .filter(w => (w.type||'strength') === type && w.exercise === name)
      .sort((a,b) => a.date > b.date ? 1 : a.date < b.date ? -1 : a.createdAt - b.createdAt);
    if (!entries.length) return null;
    if (type === 'run') {
      const withPace = entries.map(e => ({ ...e, pace: paceSecondsPerUnit(e.distance, e.durationSeconds) }));
      const paced = withPace.filter(e => e.pace != null);
      const bestEntry = paced.length ? paced.reduce((m,e) => e.pace < m.pace ? e : m, paced[0]) : entries[0];
      const longestEntry = entries.reduce((m,e) => e.distance > m.distance ? e : m, entries[0]);
      const last = withPace[withPace.length-1];
      const prev = withPace.length > 1 ? withPace[withPace.length-2] : null;
      const paceTrend = prev && last.pace != null && prev.pace != null ? last.pace - prev.pace : 0;
      const chartData = withPace.map(e => ({
        date: e.date, label: formatDateShort(e.date),
        pace: e.pace, distance: e.distance,
        isBest: paced.length ? e.pace <= bestEntry.pace : false,
      }));
      return { type, entries: [...entries].reverse(), count: entries.length, best: bestEntry, longest: longestEntry, last, paceTrend, chartData };
    }
    const maxEntry = entries.reduce((m,e) => e.weight > m.weight ? e : m, entries[0]);
    const last = entries[entries.length-1];
    const prev = entries.length > 1 ? entries[entries.length-2] : null;
    const trend = prev ? last.weight - prev.weight : 0;
    const chartData = entries.map(e => ({
      date: e.date, label: formatDateShort(e.date), weight: e.weight, isPR: e.weight >= maxEntry.weight,
    }));
    return { type, entries: [...entries].reverse(), count: entries.length, max: maxEntry, last, trend, chartData };
  }, [selectedActivity, workouts]);

  const weekCount = useMemo(() => {
    const weekAgo = new Date(Date.now() - 7*86400000);
    return workouts.filter(w => new Date(w.date+'T00:00:00') >= weekAgo).length;
  }, [workouts]);

  const uniqueVisitDates = useMemo(() => Array.from(new Set(workouts.map(w => w.date))).sort(), [workouts]);
  const todaysWorkouts   = sortedWorkouts.filter(w => w.date === todayISO());

  if (!loaded) return (
    <div style={S.page}>
      <div style={S.loadingWrap}>
        <Dumbbell size={28} color="#E8472B" />
        <span style={{ fontFamily:'Inter,sans-serif', color:'#8A9099', marginTop:10 }}>Loading…</span>
      </div>
    </div>
  );

  return (
    <div style={S.page}>
      {/* Header */}
      <header style={S.header}>
        <div style={S.headerLeft}>
          <div style={S.barIcon}>
            <div style={S.plate}/><div style={S.bar}/><div style={S.plate}/>
          </div>
          <div>
            <h1 style={S.title}>IRONLOG</h1>
            <p style={S.subtitle}>workout tracker</p>
          </div>
        </div>
        <div style={S.unitToggleGroup}>
          <button style={S.unitToggle} onClick={() => persistSettings(unit==='kg'?'lb':'kg', distanceUnit)}>{unit}</button>
          <button style={S.unitToggle} onClick={() => persistSettings(unit, distanceUnit==='km'?'mi':'km')}>{distanceUnit}</button>
        </div>
      </header>

      {/* Tabs */}
      <nav style={S.tabs}>
        <button style={{...S.tab,...(view==='log'?S.tabActive:{})}} onClick={() => setView('log')}>
          <ListChecks size={15} style={{marginRight:6}}/> Log
        </button>
        <button style={{...S.tab,...(view==='progress'?S.tabActive:{})}} onClick={() => {
          if (!selectedActivity && activities.length) setSelectedActivity(activities[0]);
          setView('progress');
        }}>
          <TrendingUp size={15} style={{marginRight:6}}/> Progress
        </button>
        <button style={{...S.tab,...(view==='calendar'?S.tabActive:{})}} onClick={() => setView('calendar')}>
          <CalendarDays size={15} style={{marginRight:6}}/> Calendar
        </button>
      </nav>

      <main style={S.main}>
        {view === 'log' && <>
          <div style={S.statRow}>
            <div style={S.statCard}><div style={S.statNum}>{workouts.length}</div><div style={S.statLabel}>Total logged</div></div>
            <div style={S.statCard}><div style={S.statNum}>{weekCount}</div><div style={S.statLabel}>This week</div></div>
            <div style={S.statCard}><div style={S.statNum}>{activities.length}</div><div style={S.statLabel}>Activities</div></div>
          </div>
          {todaysWorkouts.length > 0 && (
            <div style={S.sectionBlock}>
              <div style={S.sectionHeading}><Calendar size={14} color="#E8472B"/><span>TODAY</span></div>
              {todaysWorkouts.map(w => <WorkoutRow key={w.id} w={w} unit={unit} distanceUnit={distanceUnit} pr={isPR(w)} onDelete={handleDelete} onView={openProgress}/>)}
            </div>
          )}
          <div style={S.sectionBlock}>
            <div style={S.sectionHeading}><span>HISTORY</span></div>
            {sortedWorkouts.filter(w => w.date !== todayISO()).length === 0 && todaysWorkouts.length === 0
              ? <EmptyState onAdd={() => setShowForm(true)}/>
              : sortedWorkouts.filter(w => w.date !== todayISO()).map(w =>
                  <WorkoutRow key={w.id} w={w} unit={unit} distanceUnit={distanceUnit} pr={isPR(w)} onDelete={handleDelete} onView={openProgress}/>
                )
            }
          </div>
        </>}

        {view === 'progress' && (
          <ProgressView activities={activities} selectedActivity={selectedActivity} setSelectedActivity={setSelectedActivity}
            stats={activityStats} unit={unit} distanceUnit={distanceUnit} onDelete={handleDelete}/>
        )}

        {view === 'calendar' && (
          <CalendarFrequencyView workouts={workouts} uniqueVisitDates={uniqueVisitDates}
            calendarMonth={calendarMonth} setCalendarMonth={setCalendarMonth}
            granularity={granularity} setGranularity={setGranularity}
            selectedDay={selectedDay} setSelectedDay={setSelectedDay}
            unit={unit} distanceUnit={distanceUnit} onDelete={handleDelete}/>
        )}
      </main>

      {/* FAB */}
      <button style={S.fab} onClick={() => setShowForm(true)} aria-label="Log workout">
        <Plus size={24} color="#14161A" strokeWidth={2.5}/>
      </button>

      {/* Log form modal */}
      {showForm && (
        <div style={S.modalOverlay} onClick={() => setShowForm(false)}>
          <div style={S.modal} onClick={e => e.stopPropagation()}>
            <div style={S.modalHeader}>
              <h2 style={S.modalTitle}>Log workout</h2>
              <button style={S.iconBtn} onClick={() => setShowForm(false)}><X size={18} color="#8A9099"/></button>
            </div>

            <div style={S.typeToggleRow}>
              <button type="button"
                style={{...S.typeToggleBtn,...(form.type==='strength'?S.typeToggleBtnActive:{})}}
                onClick={() => setForm(f => ({...f, type:'strength'}))}>
                <Dumbbell size={14} style={{marginRight:6}}/> Strength
              </button>
              <button type="button"
                style={{...S.typeToggleBtn,...(form.type==='run'?S.typeToggleBtnActive:{})}}
                onClick={() => setForm(f => ({...f, type:'run'}))}>
                <Footprints size={14} style={{marginRight:6}}/> Run
              </button>
            </div>

            <form onSubmit={handleSubmit} style={S.form}>
              {form.type === 'strength' ? <>
                <label style={S.label}>
                  Exercise
                  <input style={S.input} list="strength-options" value={form.exercise}
                    onChange={e => setForm(f => ({...f, exercise:e.target.value}))}
                    placeholder="e.g. Bench Press" required autoFocus/>
                  <datalist id="strength-options">
                    {strengthNames.map(n => <option key={n} value={n}/>)}
                  </datalist>
                </label>
                <div style={{...S.formRow, gap:6}}>
                  <label style={{...S.label, flex:'0 0 38%'}}>
                    Weight ({unit})
                    <input style={S.input} type="number" inputMode="decimal" step="0.5" min="0"
                      value={form.weight} onChange={e => setForm(f => ({...f, weight:e.target.value}))}
                      placeholder="0" required/>
                  </label>
                  <label style={{...S.label, flex:1}}>
                    Reps
                    <input style={S.input} type="number" inputMode="numeric" min="0"
                      value={form.reps} onChange={e => setForm(f => ({...f, reps:e.target.value}))}
                      placeholder="—"/>
                  </label>
                  <label style={{...S.label, flex:1}}>
                    Sets
                    <input style={S.input} type="number" inputMode="numeric" min="0"
                      value={form.sets} onChange={e => setForm(f => ({...f, sets:e.target.value}))}
                      placeholder="—"/>
                  </label>
                </div>
              </> : <>
                <div style={{...S.formRow, gap:6}}>
                  <label style={{...S.label, flex:1}}>
                    Distance ({distanceUnit})
                    <input style={S.input} type="number" inputMode="decimal" step="0.01" min="0"
                      value={form.distance} onChange={e => setForm(f => ({...f, distance:e.target.value}))}
                      placeholder="0" required autoFocus/>
                  </label>
                  <label style={{...S.label, flex:1}}>
                    Minutes
                    <input style={S.input} type="number" inputMode="numeric" min="0"
                      value={form.durationMin} onChange={e => setForm(f => ({...f, durationMin:e.target.value}))}
                      placeholder="0"/>
                  </label>
                  <label style={{...S.label, flex:1}}>
                    Seconds
                    <input style={S.input} type="number" inputMode="numeric" min="0" max="59"
                      value={form.durationSec} onChange={e => setForm(f => ({...f, durationSec:e.target.value}))}
                      placeholder="0"/>
                  </label>
                </div>
                <label style={S.label}>
                  Route (optional)
                  <input style={S.input} value={form.route}
                    onChange={e => setForm(f => ({...f, route:e.target.value}))}
                    placeholder="e.g. Corrimal loop"/>
                </label>
              </>}

              <label style={S.label}>
                Date
                <input style={S.input} type="date" value={form.date} max={todayISO()}
                  onChange={e => setForm(f => ({...f, date:e.target.value}))}/>
              </label>
              <label style={S.label}>
                Notes
                <textarea style={{...S.input, minHeight:56, resize:'vertical', fontFamily:'Inter,sans-serif'}}
                  value={form.notes} onChange={e => setForm(f => ({...f, notes:e.target.value}))}
                  placeholder="How did it feel?"/>
              </label>
              <button type="submit" style={S.submitBtn}>Save workout</button>
            </form>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast && (
        <div style={S.toast}>
          {toast.startsWith('New PR') && <Flame size={16} color="#E8472B" style={{marginRight:8}}/>}
          {toast}
        </div>
      )}
    </div>
  );
}

// ─── WorkoutRow ───────────────────────────────────────────────────────────────
function WorkoutRow({ w, unit, distanceUnit, pr, onDelete, onView }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  const isRun = w.type === 'run';
  const pace  = isRun ? paceSecondsPerUnit(w.distance, w.durationSeconds) : null;
  return (
    <div style={S.row}>
      <div style={S.rowMain} onClick={() => onView(w.type, w.exercise)}>
        <div style={S.rowTop}>
          {isRun ? <Footprints size={13} color="#5B6470" style={{marginRight:2}}/> : <Dumbbell size={13} color="#5B6470" style={{marginRight:2}}/>}
          <span style={S.exerciseName}>{w.exercise}</span>
          {pr && <span style={S.prBadge}><Flame size={11} style={{marginRight:3}}/> PR</span>}
        </div>
        <div style={S.rowMeta}>
          {isRun ? <>
            <span style={S.weightVal}>{w.distance}<span style={S.unitSm}>{distanceUnit}</span></span>
            <span style={S.repsVal}>{formatDuration(w.durationSeconds)}</span>
            {pace != null && <span style={S.repsVal}>{formatPace(pace, distanceUnit)} pace</span>}
          </> : <>
            <span style={S.weightVal}>{w.weight}<span style={S.unitSm}>{unit}</span></span>
            {(w.sets||w.reps) && <span style={S.repsVal}>{w.sets?`${w.sets} × `:''}{w.reps?`${w.reps} reps`:''}</span>}
          </>}
          <span style={S.dateVal}>{formatDate(w.date)}</span>
        </div>
        {w.notes && <div style={S.noteText}>{w.notes}</div>}
      </div>
      <div style={S.rowActions}>
        {confirmDelete
          ? <div style={{display:'flex',gap:6}}>
              <button style={S.confirmBtn} onClick={() => onDelete(w.id)}>Delete</button>
              <button style={S.cancelBtn}  onClick={() => setConfirmDelete(false)}>Cancel</button>
            </div>
          : <button style={S.iconBtnGhost} onClick={() => setConfirmDelete(true)} aria-label="Delete">
              <Trash2 size={15} color="#5B6470"/>
            </button>
        }
        <ChevronRight size={16} color="#3A3F45"/>
      </div>
    </div>
  );
}

function EmptyState({ onAdd }) {
  return (
    <div style={S.empty}>
      <Dumbbell size={26} color="#3A3F45"/>
      <p style={S.emptyText}>No workouts logged yet.</p>
      <button style={S.emptyBtn} onClick={onAdd}>Log your first set</button>
    </div>
  );
}

// ─── ProgressView ─────────────────────────────────────────────────────────────
function ProgressView({ activities, selectedActivity, setSelectedActivity, stats, unit, distanceUnit, onDelete }) {
  if (!activities.length) return (
    <div style={S.empty}>
      <TrendingUp size={26} color="#3A3F45"/>
      <p style={S.emptyText}>Log a workout to start tracking progress.</p>
    </div>
  );
  const isRun = stats && stats.type === 'run';
  return (
    <div>
      <div style={S.exerciseSelectRow}>
        {activities.map(a => {
          const active = selectedActivity && a.type===selectedActivity.type && a.name===selectedActivity.name;
          return (
            <button key={activityKey(a.type,a.name)}
              style={{...S.exerciseChip,...(active?S.exerciseChipActive:{})}}
              onClick={() => setSelectedActivity(a)}>
              {a.type==='run'
                ? <Footprints size={12} style={{marginRight:5,verticalAlign:-2}}/>
                : <Dumbbell   size={12} style={{marginRight:5,verticalAlign:-2}}/>}
              {a.name}
            </button>
          );
        })}
      </div>

      {stats && isRun && <>
        <div style={S.statRow}>
          <div style={S.statCard}><div style={S.statNum}>{stats.count}</div><div style={S.statLabel}>Times run</div></div>
          <div style={S.statCard}>
            <div style={{...S.statNum, color:'#E8472B', fontSize:20}}>
              {formatPace(stats.best.pace ?? paceSecondsPerUnit(stats.best.distance,stats.best.durationSeconds), distanceUnit)}
            </div>
            <div style={S.statLabel}><Award size={11} style={{marginRight:3,verticalAlign:-1}}/> Best pace</div>
          </div>
          <div style={S.statCard}>
            <div style={{...S.statNum, fontSize:20, color: stats.paceTrend<0?'#4FA876':stats.paceTrend>0?'#C95C4A':'#EDEAE2'}}>
              {stats.paceTrend===0 ? '—' : `${stats.paceTrend<0?'-':'+'}${formatDuration(Math.abs(stats.paceTrend))}`}
            </div>
            <div style={S.statLabel}>pace vs last</div>
          </div>
        </div>
        <div style={S.statRow}>
          <div style={S.statCard}>
            <div style={S.statNum}>{stats.longest.distance}<span style={S.unitSm}>{distanceUnit}</span></div>
            <div style={S.statLabel}>Longest run</div>
          </div>
          <div style={{...S.statCard, flex:2}}>
            <div style={S.statNum}>{formatDuration(stats.last.durationSeconds)}</div>
            <div style={S.statLabel}>Last duration</div>
          </div>
        </div>
        <div style={S.chartCard}>
          <div style={S.chartTitle}>{selectedActivity.name} — pace over time (lower is faster)</div>
          {stats.chartData.filter(d => d.pace!=null).length > 1
            ? <ResponsiveContainer width="100%" height={220}>
                <LineChart data={stats.chartData} margin={{top:10,right:12,left:-18,bottom:0}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#2C3036" vertical={false}/>
                  <XAxis dataKey="label" tick={{fill:'#5B6470',fontSize:11,fontFamily:'JetBrains Mono,monospace'}} axisLine={{stroke:'#2C3036'}} tickLine={false}/>
                  <YAxis reversed tick={{fill:'#5B6470',fontSize:10.5,fontFamily:'JetBrains Mono,monospace'}} axisLine={false} tickLine={false} width={42}
                    tickFormatter={v => formatDuration(v)} domain={['dataMin - 15','dataMax + 15']}/>
                  <Tooltip contentStyle={{background:'#1D2024',border:'1px solid #2C3036',borderRadius:8,fontFamily:'Inter,sans-serif',fontSize:12}}
                    labelStyle={{color:'#8A9099'}} itemStyle={{color:'#EDEAE2'}}
                    formatter={v => [formatPace(v, distanceUnit),'Pace']}/>
                  <Line type="monotone" dataKey="pace" stroke="#E8472B" strokeWidth={2.5} connectNulls
                    dot={props => {
                      const {cx,cy,payload,index} = props;
                      return <Dot key={`dot-${index}`} cx={cx} cy={cy} r={payload.isBest?5:3.5}
                        fill={payload.isBest?'#E8472B':'#14161A'} stroke="#E8472B" strokeWidth={2}/>;
                    }}
                    activeDot={{r:6,fill:'#E8472B'}}/>
                </LineChart>
              </ResponsiveContainer>
            : <p style={S.chartEmpty}>Log this run at least twice to see a pace trend.</p>}
        </div>
        <div style={S.sectionBlock}>
          <div style={S.sectionHeading}><span>SESSION HISTORY</span></div>
          {stats.entries.map(w => <WorkoutRow key={w.id} w={w} unit={unit} distanceUnit={distanceUnit}
            pr={stats.best && w.id===stats.best.id} onDelete={onDelete} onView={()=>{}}/>)}
        </div>
      </>}

      {stats && !isRun && <>
        <div style={S.statRow}>
          <div style={S.statCard}><div style={S.statNum}>{stats.count}</div><div style={S.statLabel}>Times done</div></div>
          <div style={S.statCard}>
            <div style={{...S.statNum, color:'#E8472B'}}>{stats.max.weight}<span style={S.unitSm}>{unit}</span></div>
            <div style={S.statLabel}><Award size={11} style={{marginRight:3,verticalAlign:-1}}/> Best</div>
          </div>
          <div style={S.statCard}>
            <div style={{...S.statNum, color:stats.trend>0?'#4FA876':stats.trend<0?'#C95C4A':'#EDEAE2'}}>
              {stats.trend>0?'+':''}{stats.trend}
            </div>
            <div style={S.statLabel}>vs last time</div>
          </div>
        </div>
        <div style={S.chartCard}>
          <div style={S.chartTitle}>{selectedActivity.name} — weight over time</div>
          {stats.chartData.length > 1
            ? <ResponsiveContainer width="100%" height={220}>
                <LineChart data={stats.chartData} margin={{top:10,right:12,left:-18,bottom:0}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#2C3036" vertical={false}/>
                  <XAxis dataKey="label" tick={{fill:'#5B6470',fontSize:11,fontFamily:'JetBrains Mono,monospace'}} axisLine={{stroke:'#2C3036'}} tickLine={false}/>
                  <YAxis tick={{fill:'#5B6470',fontSize:11,fontFamily:'JetBrains Mono,monospace'}} axisLine={false} tickLine={false} width={36} domain={['dataMin - 5','dataMax + 5']}/>
                  <Tooltip contentStyle={{background:'#1D2024',border:'1px solid #2C3036',borderRadius:8,fontFamily:'Inter,sans-serif',fontSize:12}}
                    labelStyle={{color:'#8A9099'}} itemStyle={{color:'#EDEAE2'}}
                    formatter={v => [`${v} ${unit}`,'Weight']}/>
                  <Line type="monotone" dataKey="weight" stroke="#E8472B" strokeWidth={2.5}
                    dot={props => {
                      const {cx,cy,payload,index} = props;
                      return <Dot key={`dot-${index}`} cx={cx} cy={cy} r={payload.isPR?5:3.5}
                        fill={payload.isPR?'#E8472B':'#14161A'} stroke="#E8472B" strokeWidth={2}/>;
                    }}
                    activeDot={{r:6,fill:'#E8472B'}}/>
                </LineChart>
              </ResponsiveContainer>
            : <p style={S.chartEmpty}>Log this exercise at least twice to see a trend line.</p>}
        </div>
        <div style={S.sectionBlock}>
          <div style={S.sectionHeading}><span>SESSION HISTORY</span></div>
          {stats.entries.map(w => <WorkoutRow key={w.id} w={w} unit={unit} distanceUnit={distanceUnit}
            pr={w.weight >= stats.max.weight} onDelete={onDelete} onView={()=>{}}/>)}
        </div>
      </>}
    </div>
  );
}

// ─── CalendarFrequencyView ────────────────────────────────────────────────────
function CalendarFrequencyView({ workouts, uniqueVisitDates, calendarMonth, setCalendarMonth,
  granularity, setGranularity, selectedDay, setSelectedDay, unit, distanceUnit, onDelete }) {

  const visitSet = useMemo(() => new Set(uniqueVisitDates), [uniqueVisitDates]);
  const today    = todayISO();

  const gridDays = useMemo(() => {
    const first     = startOfMonth(calendarMonth);
    const gridStart = startOfWeek(first);
    return Array.from({length:42}, (_,i) => addDays(gridStart, i));
  }, [calendarMonth]);

  const monthLabel = calendarMonth.toLocaleDateString('en-AU', { month:'long', year:'numeric' });
  const monthVisitCount = uniqueVisitDates.filter(iso => {
    const d = parseISO(iso);
    return d.getFullYear()===calendarMonth.getFullYear() && d.getMonth()===calendarMonth.getMonth();
  }).length;

  const buckets     = useMemo(() => buildVisitBuckets(uniqueVisitDates, granularity), [uniqueVisitDates, granularity]);
  const slope       = useMemo(() => trendSlope(buckets), [buckets]);
  const trendSummary = useMemo(() => {
    if (buckets.length < 4) return null;
    const mid  = Math.floor(buckets.length/2);
    const avg  = arr => arr.reduce((a,b)=>a+b.count,0)/arr.length;
    const a    = avg(buckets.slice(0,mid));
    const b    = avg(buckets.slice(mid));
    if (a===0 && b===0) return { dir:'flat', pct:0 };
    const pct  = a===0 ? 100 : Math.round(((b-a)/a)*100);
    const dir  = slope>0.03 ? 'up' : slope<-0.03 ? 'down' : 'flat';
    return { dir, pct };
  }, [buckets, slope]);

  const selectedDayWorkouts = selectedDay ? workouts.filter(w => w.date===selectedDay) : [];
  const weekdayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  return (
    <div>
      <div style={S.calendarCard}>
        <div style={S.calendarNav}>
          <button style={S.navBtn} onClick={() => setCalendarMonth(m => addMonths(m,-1))} aria-label="Prev">
            <ChevronLeft size={18} color="#8A9099"/>
          </button>
          <div style={S.calendarMonthLabel}>{monthLabel}</div>
          <button style={S.navBtn} onClick={() => setCalendarMonth(m => addMonths(m,1))} aria-label="Next">
            <ChevronRight size={18} color="#8A9099"/>
          </button>
        </div>
        <div style={S.weekdayRow}>
          {weekdayLabels.map(d => <div key={d} style={S.weekdayCell}>{d}</div>)}
        </div>
        <div style={S.calendarGrid}>
          {gridDays.map(d => {
            const iso        = toISO(d);
            const inMonth    = d.getMonth() === calendarMonth.getMonth();
            const visited    = visitSet.has(iso);
            const isToday    = iso === today;
            const isSelected = iso === selectedDay;
            return (
              <button key={iso}
                onClick={() => setSelectedDay(isSelected ? null : (visited ? iso : null))}
                disabled={!visited}
                style={{
                  ...S.dayCell,
                  ...(inMonth ? {} : S.dayCellFaded),
                  ...(visited    ? S.dayCellVisited  : {}),
                  ...(isToday    ? S.dayCellToday    : {}),
                  ...(isSelected ? S.dayCellSelected : {}),
                  cursor: visited ? 'pointer' : 'default',
                }}>
                {d.getDate()}
              </button>
            );
          })}
        </div>
        <div style={S.calendarFooter}>
          <span style={S.calendarFooterText}>
            <Flame size={12} color="#E8472B" style={{marginRight:4,verticalAlign:-2}}/>
            {monthVisitCount} {monthVisitCount===1 ? 'visit' : 'visits'} this month
          </span>
        </div>
      </div>

      {selectedDay && (
        <div style={S.sectionBlock}>
          <div style={S.sectionHeading}><span>{formatDate(selectedDay).toUpperCase()}</span></div>
          {selectedDayWorkouts.map(w =>
            <WorkoutRow key={w.id} w={w} unit={unit} distanceUnit={distanceUnit} pr={false} onDelete={onDelete} onView={()=>{}}/>
          )}
        </div>
      )}

      <div style={S.sectionHeading}><span>VISIT FREQUENCY</span></div>
      <div style={S.granularityRow}>
        {['week','month','year'].map(g => (
          <button key={g} style={{...S.granularityChip,...(granularity===g?S.granularityChipActive:{})}}
            onClick={() => setGranularity(g)}>{g}</button>
        ))}
      </div>

      {trendSummary && (
        <div style={S.trendBanner}>
          {trendSummary.dir==='up'   && <TrendingUp   size={16} color="#4FA876"/>}
          {trendSummary.dir==='down' && <TrendingDown size={16} color="#C95C4A"/>}
          {trendSummary.dir==='flat' && <Minus        size={16} color="#8A9099"/>}
          <span style={S.trendBannerText}>
            {trendSummary.dir==='up'   && `Visits are trending up — averaging ${Math.abs(trendSummary.pct)}% more per ${granularity} in the recent half of your log.`}
            {trendSummary.dir==='down' && `Visits have slowed — averaging ${Math.abs(trendSummary.pct)}% fewer per ${granularity} recently than earlier on.`}
            {trendSummary.dir==='flat' && `Your visit frequency has stayed roughly steady over time.`}
          </span>
        </div>
      )}

      <div style={S.chartCard}>
        {buckets.length > 1
          ? <ResponsiveContainer width="100%" height={200}>
              <BarChart data={buckets} margin={{top:10,right:12,left:-18,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2C3036" vertical={false}/>
                <XAxis dataKey="label" tick={{fill:'#5B6470',fontSize:10.5,fontFamily:'JetBrains Mono,monospace'}}
                  axisLine={{stroke:'#2C3036'}} tickLine={false}
                  interval={buckets.length>10 ? Math.ceil(buckets.length/10)-1 : 0}/>
                <YAxis tick={{fill:'#5B6470',fontSize:11,fontFamily:'JetBrains Mono,monospace'}}
                  axisLine={false} tickLine={false} width={28} allowDecimals={false}/>
                <Tooltip contentStyle={{background:'#1D2024',border:'1px solid #2C3036',borderRadius:8,fontFamily:'Inter,sans-serif',fontSize:12}}
                  labelStyle={{color:'#8A9099'}} itemStyle={{color:'#EDEAE2'}}
                  formatter={v => [v,'Visits']}/>
                <Bar dataKey="count" radius={[4,4,0,0]}>
                  {buckets.map((b,i) => <Cell key={i} fill={b.count===0?'#24272C':'#E8472B'}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          : <p style={S.chartEmpty}>Log a few more sessions to see your visit frequency trend.</p>}
      </div>
    </div>
  );
}
